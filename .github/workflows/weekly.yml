name: Weekly CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 3
  PYTHON_VERSIONS: '["3.12", "3.13", "3.14"]'

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ env.PYTHON_VERSIONS }}
    steps:
      - id: versions
        run: |
          versions='${{ env.PYTHON_VERSIONS }}'
          echo "versions=$versions" >> $GITHUB_OUTPUT

  newest-supported:
    name: Newest deps (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with latest stable deps
        run: uv sync --no-default-groups --group tests --upgrade

      - name: Test
        run: uv run --no-sync pytest

  pre-release:
    name: Pre-release deps (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with pre-release deps (alpha/beta/rc/nightly)
        run: |
          uv sync --no-default-groups --group tests --upgrade --prerelease=allow

      - name: Test
        run: uv run --no-sync pytest

  weekly-pass:
    name: Weekly CI Pass
    runs-on: ubuntu-latest
    needs: [setup, newest-supported, pre-release]
    if: always()
    steps:
      - name: All required jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
